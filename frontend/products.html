<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - LUXE FW</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header { background-color: var(--primary); color: white; padding: 160px 0 60px 0; text-align: center; margin-top: 65px; }
        .products-container { display: flex; gap: 3rem; margin: 4rem auto; }
        .filters { width: 250px; flex-shrink: 0; }
        .filter-group { margin-bottom: 2rem; }
        .filter-title { font-weight: 600; margin-bottom: 1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
        .filter-list { list-style: none; }
        .filter-list li { margin-bottom: 0.5rem; }
        .filter-list input { margin-right: 10px; }
        .main-content { flex: 1; }
        
        /* Search styling overlay */
        .search-bar { display: flex; margin-bottom: 2rem; }
        .search-input { flex: 1; padding: 1rem 1.5rem; border: 1px solid var(--border); border-radius: var(--radius-md) 0 0 var(--radius-md); font-family: inherit; font-size: 1rem; outline: none; }
        .search-btn { padding: 1rem 2rem; background: var(--primary); color: white; border: none; border-radius: 0 var(--radius-md) var(--radius-md) 0; cursor: pointer; font-weight: 500; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">LUXE<span>FW</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
        <div class="nav-actions" id="auth-links">
            <a href="login.html" class="nav-links">Login</a>
            <a href="register.html" class="btn btn-primary">Register</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title" style="color: white; font-size: 3rem;">Tất Cả Sản Phẩm</h1>
            <p style="color: #dfe6e9; font-size: 1.2rem; margin-top: 1rem;">Lựa chọn tốt nhất cho bé yêu của bạn.</p>
        </div>
    </header>

    <main class="container products-container">
        <!-- Sidebar -->
        <aside class="filters">
            <div class="filter-group">
                <h3 class="filter-title">Danh mục</h3>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> Đồ sơ sinh</label></li>
                    <li><label><input type="checkbox"> Bé gái / Váy</label></li>
                    <li><label><input type="checkbox"> Bé trai / Sơ mi</label></li>
                </ul>
            </div>
            <div class="filter-group">
                <h3 class="filter-title">Giá</h3>
                <ul class="filter-list">
                    <li><label><input type="radio" name="price" value="under100"> Dưới 100k</label></li>
                    <li><label><input type="radio" name="price" value="100to200"> 100k - 200k</label></li>
                    <li><label><input type="radio" name="price" value="over200"> Trên 200k</label></li>
                </ul>
            </div>
            
            <button class="btn btn-primary" style="width: 100%; border-radius: var(--radius-sm); font-size: 1rem; padding: 0.8rem;" onclick="applyFilters()">Áp dụng lựa chọn</button>
        </aside>

        <!-- Main Product Grid -->
        <div class="main-content">
            <!-- Search -->
            <div class="search-bar">
                <input type="text" id="search-input" class="search-input" placeholder="Tìm kiếm sản phẩm theo tên...">
                <button class="search-btn" onclick="handleSearch()">Tìm kiếm</button>
            </div>
            
            <div class="grid-products" id="products-grid">
                <div style="text-align: center; width: 100%; grid-column: 1 / -1;">Đang tải danh sách sản phẩm...</div>
            </div>
        </div>
    </main>

    <footer style="background: var(--primary); color: white; padding: 3rem 5%; text-align: center; margin-top: 5rem;">
        <h2 style="color: white; margin-bottom: 1rem;">LUXE<span>FW</span></h2>
        <p style="color: #b2bec3;">Nơi thời trang bắt đầu. Tất cả các quyền được bảo lưu &copy; 2026</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Already handled by products.js if we wanted, 
            // but let's call it explicitly for the grid
            if (typeof loadProducts === 'function') {
                loadProducts('products-grid');
            }
        });
    </script>
</body>
</html>
