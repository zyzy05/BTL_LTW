<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LUXE FW</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ebf5 100%); 
            min-height: 100vh; 
            display: flex; flex-direction: column; 
        }
        .main-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;
        }
        .split-container { 
            display: flex; width: 1000px; max-width: 100%; min-height: 600px; 
            background: white; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; 
        }
        .split-left { 
            flex: 1; 
            background: url('images/girl_cardigan.png') center/cover no-repeat; 
            position: relative; display: none;
        }
        @media (min-width: 800px) { .split-left { display: block; } }
        .split-left::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); 
        }
        .split-quote { 
            position: absolute; bottom: 40px; left: 40px; color: white; right: 40px; z-index: 2; 
        }
        .split-quote h2 { font-size: 2.2rem; margin-bottom: 10px; color: white; }
        .split-quote p { font-size: 1.1rem; opacity: 0.9; }

        .split-right { 
            flex: 1.2; padding: 2.5rem 3rem; display: flex; flex-direction: column; justify-content: center; 
        }
        .auth-logo { 
            font-size: 1.8rem; font-weight: 800; color: var(--primary); 
            text-decoration: none; margin-bottom: 5px; text-align: center; 
            display: block;
        }
        .auth-logo span { color: var(--accent); }
        .auth-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;}
        
        .form-group { margin-bottom: 1rem; position: relative; }
        .form-label { display: block; margin-bottom: 0.3rem; font-weight: 500; font-size: 0.9rem; }
        .form-input { 
            width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border); 
            border-radius: var(--radius-sm); font-family: inherit; font-size: 0.95rem; 
            background: #fdfdfd; transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
            background: white;
        }
        .auth-links { text-align: center; margin-top: 1.5rem; font-size: 0.95rem; }
        .auth-links a { font-weight: 600; color: var(--accent); }
        .row-2 { display: flex; gap: 1rem; }
        .col { flex: 1; }
    </style>
</head>
<body>

    <nav style="padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="logo" style="margin:0;">LUXE<span>FW</span></a>
        <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-weight: 500;">&larr; Cửa hàng</a>
    </nav>

    <div class="main-wrapper">
        <div class="split-container">
            <div class="split-left">
                <div class="split-quote">
                    <h2>Đặc quyền thành viên.</h2>
                    <p>Hãy cùng LUXE FW mang những thiết kế xuất sắc nhất tới bé yêu.</p>
                </div>
            </div>
            
            <div class="split-right">
                <a href="index.html" class="auth-logo">LUXE<span>FW</span></a>
                <p class="auth-subtitle">Tạo tài khoản mới</p>
                
                <form id="registerForm">
                    <div class="row-2">
                        <div class="form-group col">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" name="username" id="reg-username" class="form-input" required>
                        </div>
                        <div class="form-group col">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" name="password" id="reg-password" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="row-2">
                        <div class="form-group col">
                            <label class="form-label">Họ tên</label>
                            <input type="text" name="fullName" id="reg-fullname" class="form-input" required>
                        </div>
                        <div class="form-group col">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" name="phone" id="reg-phone" class="form-input" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" id="reg-email" class="form-input" required>
                    </div>
                    
                    <div class="form-group" style="margin-top: 1rem;">
                        <h4 style="margin-bottom: 0.5rem; font-size: 0.95rem; color: var(--primary);">Địa chỉ giao hàng</h4>
                        <input type="text" name="addressLine" id="reg-address" class="form-input" placeholder="Số nhà, Tên đường" style="margin-bottom: 0.5rem;" required>
                        <div class="row-2">
                            <input type="text" name="ward" id="reg-ward" class="form-input col" placeholder="Phường/Xã" required>
                            <input type="text" name="district" id="reg-district" class="form-input col" placeholder="Quận/Huyện" required>
                        </div>
                        <input type="text" name="city" id="reg-city" class="form-input" placeholder="Tỉnh/Thành phố" style="margin-top: 0.5rem;" required>
                        <!-- Added confirmPassword natively to prevent JS error -->
                        <input type="hidden" name="confirmPassword" id="reg-confirm" value="">
                    </div>

                    <button type="submit" id="registerBtn" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-size: 1rem; border-radius: var(--radius-sm); margin-top: 0.5rem;">Đăng Ký Tài Khoản</button>
                </form>
                
                <div class="auth-links">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
