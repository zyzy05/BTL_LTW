<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LUXE FW</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ebf5 100%); 
            min-height: 100vh; 
            display: flex; flex-direction: column; 
        }
        .main-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;
        }
        .split-container { 
            display: flex; width: 1000px; max-width: 100%; height: 600px; 
            background: white; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; 
        }
        .split-left { 
            flex: 1; 
            background: url('images/boy_jeans.png') center/cover no-repeat; 
            position: relative; display: none;
        }
        @media (min-width: 768px) { .split-left { display: block; } }
        .split-left::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); 
        }
        .split-quote { 
            position: absolute; bottom: 40px; left: 40px; color: white; right: 40px; z-index: 2; 
        }
        .split-quote h2 { font-size: 2.2rem; margin-bottom: 10px; color: white; }
        .split-quote p { font-size: 1.1rem; opacity: 0.9; }

        .split-right { 
            flex: 1; padding: 3rem 4rem; display: flex; flex-direction: column; justify-content: center; 
        }
        .auth-logo { 
            font-size: 2rem; font-weight: 800; color: var(--primary); 
            text-decoration: none; margin-bottom: 10px; text-align: center; 
        }
        .auth-logo span { color: var(--accent); }
        .auth-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2.5rem; }
        
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem; }
        .form-input { 
            width: 100%; padding: 1rem 1.2rem; border: 1px solid var(--border); 
            border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem; 
            background: #fdfdfd; transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
            background: white;
        }
        .auth-links { text-align: center; margin-top: 2rem; font-size: 0.95rem; }
        .auth-links a { font-weight: 600; }
    </style>
</head>
<body>

    <!-- Simple Top Nav for auth pages -->
    <nav style="padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="logo" style="margin:0;">LUXE<span>FW</span></a>
        <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-weight: 500;">&larr; Quay lại Home</a>
    </nav>

    <div class="main-wrapper">
        <div class="split-container">
            <div class="split-left">
                <div class="split-quote">
                    <h2>Định hình phong cách.</h2>
                    <p>Khám phá thế giới thời trang trẻ em cao cấp. Mang đến cho bé yêu diện mạo tự tin mỗi ngày.</p>
                </div>
            </div>
            
            <div class="split-right">
                <a href="index.html" class="auth-logo">LUXE<span>FW</span></a>
                <p class="auth-subtitle">Đăng nhập tài khoản của bạn</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" name="username" id="username" class="form-input" placeholder="Nhập username..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: var(--radius-sm);">Đăng Nhập</button>
                </form>
                
                <div class="auth-links">
                    Chưa có tài khoản? <a href="register.html" style="color: var(--accent);">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
